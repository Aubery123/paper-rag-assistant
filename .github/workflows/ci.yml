name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # 单测均为确定性逻辑，不依赖网络/百炼 API/Qdrant；
        # 需要 PDF 样本或外部服务的用例自动跳过（见各 test 的 skipif）
        run: pytest -q
